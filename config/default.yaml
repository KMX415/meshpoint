radio:
  region: "US"
  # Frequency: set frequency_mhz (explicit MHz) OR slot (Meshtastic 1-indexed
  # slot number). frequency_mhz wins if both are present. If neither is set,
  # the regional default is used. Examples:
  #   frequency_mhz: 906.875
  #   slot: 20
  spreading_factor: 11
  bandwidth_khz: 250.0
  coding_rate: "4/5"
  sync_word: 0x2B
  preamble_length: 16
  tx_power_dbm: 22
  # HAL GPS/PPS (RAK Pi HAT u-blox → concentrator PPS pin). Off by default.
  # gps_pps_enabled: false
  # gps_pps_tty_path: "/dev/ttyAMA0"
  # gps_family: "ubx7"
  # gps_pps_target_baud: 0   # 0 = HAL default (9600)

meshtastic:
  default_key_b64: "AQ=="
  primary_channel_name: "LongFast"
  # channel_keys:
  #   MyChannel: "base64encodedPSK=="
  #   SecretChat: "anotherBase64PSK=="
  channel_keys: {}
  # Remote ADMIN config read (PR 15) — PSK for the shared admin channel on target nodes.
  # admin_key_b64: "base64PSK=="
  # admin_channel_name: "admin"

meshcore:
  default_key_b64: ""
  channel_keys: {}

capture:
  sources: []
  serial_port: null
  serial_baud: 115200
  concentrator_spi_device: "/dev/spidev0.0"
  meshcore_usb:
    serial_port: null
    baud_rate: 115200
    auto_detect: true

storage:
  database_path: "data/concentrator.db"
  max_packets_retained: 100000
  cleanup_interval_seconds: 3600

dashboard:
  host: "0.0.0.0"
  port: 8080
  static_dir: "frontend"

device:
  device_name: "Meshpoint"
  latitude: 0.0
  longitude: 0.0
  altitude: 25
  hardware_description: "RAK2287 + Raspberry Pi 4"
  firmware_version: "0.7.5.1"

relay:
  enabled: false
  serial_port: null       # SX1262 relay radio, e.g. "/dev/ttyACM1"
  serial_baud: 115200
  max_relay_per_minute: 20
  burst_size: 5
  min_relay_rssi: -110.0
  max_relay_rssi: -50.0
  # blocklist: []         # 8-char hex node IDs — relay only, feed unchanged
  # priority_list: []     # bypass burst gate under congestion
  # dedup_ttl_seconds: 300
  # channel_throttle_percent:   # per-channel relay duty budget (est. ToA)
  #   "0": 100                  # omit = 100% all channels; EU capped at 1%
  # storm_guard:                # memory-only quarantine (PR 12)
  #   enabled: false
  #   window_seconds: 60
  #   identical_packet_threshold: 5
  #   rate_threshold_per_minute: 30
  #   quarantine_duration_seconds: 300
  #   notify_dashboard: true

upstream:
  enabled: true
  url: "wss://api.meshradar.io"
  reconnect_interval_seconds: 10
  buffer_max_size: 5000
  auth_token: null

transmit:
  enabled: false
  node_id: null             # auto-generated 4-byte Meshtastic node ID
  tx_power_dbm: 14          # conservative default (dBm)
  # max_duty_cycle_percent omitted: auto-derives from radio.region
  # (10% US/ANZ/KR/SG_923, 1% EU_868/IN). Override here to pin.
  long_name: "Meshpoint"
  short_name: "MPNT"
  hop_limit: 3
  nodeinfo:
    interval_minutes: 180      # 5..1440 min, default 180 (3 hr); 0 = disabled
    startup_delay_seconds: 60  # delay before first broadcast on boot

web_auth:
  # First-run state: hashes are empty -> dashboard forces /setup.
  # After setup, the admin hash is written via the API and the JWT
  # secret is auto-generated. Rotating jwt_secret (e.g. via
  # `meshpoint reset-password`) invalidates every active session.
  admin_password_hash: ""
  viewer_password_hash: ""
  jwt_secret: ""
  jwt_expiry_minutes: 60
  allow_read_only: false
  lockout_attempts: 5
  lockout_cooldown_minutes: 5
  session_version: 1

mqtt:
  enabled: false
  broker: "mqtt.meshtastic.org"
  port: 1883
  username: "meshdev"
  password: "large4cats"
  # Topic format is "<topic_root>/<region>/2/e/<channel>/<gateway_id>".
  # `topic_root` and `region` are concatenated with a slash, so leave
  # `topic_root` as "msh" and use `region` for the regional segment
  # (the Meshtastic spec). Setting topic_root to "msh/US/FL" while
  # leaving region="US" doubles the region: msh/US/FL/US/2/e/...
  # `mqtt.region` is independent of `radio.region`: defaults to "US".
  topic_root: "msh"
  region: "US"
  publish_channels:
    - "LongFast"
    - "MeshCore"
  publish_json: false
  location_precision: "exact"
  homeassistant_discovery: false

location:
  # Where the Meshpoint's reported lat/lon/alt comes from.
  #   static : use device.latitude/longitude/altitude (default)
  #   gpsd   : poll a local or remote gpsd daemon for live fixes
  #   uart   : on-board RAK Pi HAT GPS via /dev/ttyAMA0 (NMEA GGA)
  source: "static"
  # gpsd connection. Defaults match the well-known local socket; only
  # change when running gpsd on a peer machine on the LAN.
  gpsd_host: "127.0.0.1"
  gpsd_port: 2947
  uart_path: "/dev/ttyAMA0"
  uart_baud: 9600
  # How often the coordinator wakes to read the active source.
  update_interval_seconds: 5
  # Minimum acceptable fix mode: 0=any (incl. no-fix), 1=2D, 2=3D.
  min_fix_quality: 1

# signal_health:
#   green_rssi_floor: -100    # badge green when 1h avg RSSI is above this
#   yellow_rssi_floor: -115   # badge yellow above this, red below
#   min_packets_per_hour: 5   # hide badge when fewer packets in the last hour

