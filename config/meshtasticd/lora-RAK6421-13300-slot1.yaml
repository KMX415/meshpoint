Meta:
  name: RAK6421 + RAK13300 Slot 1
  support: official
  compatible:
    - raspberry-pi

Lora:

  ### RAK13300 standard power in Slot 1 (no external PA)
  Module: sx1262
  IRQ: 22 #IO6
  Reset: 16 # IO4
  Busy: 24 # IO5
  Enable_Pins:
    - 12
    - 13
  DIO3_TCXO_VOLTAGE: true
  DIO2_AS_RF_SWITCH: true
  spidev: spidev0.0
  CS: 8
